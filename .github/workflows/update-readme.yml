name: Update README every hour

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update README block
        run: |
          python - <<'PY'
          from pathlib import Path
          readme = Path("README.md")
          text = readme.read_text(encoding="utf-8")

          old = """<div align="center">
            <img align="left" src="https://github-readme-stats.shion.dev/api/top-langs/?username=StudlyCase&theme=dark&hide_border=false&include_all_commits=false&count_private=false&layout=compact" width="400" />
            <br>
            <h3 style="float: right; width: 50%;">Hello, I'm StudlyCase</h3>
            <h5 style="float: right; width: 50%; margin-top: -10px;">
              🛠️ I'm currently working on RapidForge.<br>
              📜 I'm currently learning Java.
            </h5>
          </div>"""

          new = """<div align="center">
            <img align="left" src="https://github-readme-stats.shion.dev/api/top-langs/?username=StudlyCase&theme=dark&hide_border=false&include_all_commits=false&count_private=false&layout=compact&cache_bust=$(date +%s)" width="400" />
            <br>
            <h3 style="float: right; width: 50%;">Hello, I'm StudlyCase</h3>
            <h5 style="float: right; width: 50%; margin-top: -10px;">
              🛠️ I'm currently working on RapidForge.<br>
              📜 I'm currently learning Java.
            </h5>
            <p>Last refresh: $(date -u '+%Y-%m-%d %H:00 UTC')</p>
          </div>"""

          if old not in text:
              raise SystemExit("Target block not found")
          text = text.replace(old, new)
          readme.write_text(text, encoding="utf-8")
          PY

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "chore: hourly README update" || exit 0
          git push
